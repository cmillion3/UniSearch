<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Search</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; margin: 0; padding: 0; }
    header { background: #004080; color: white; padding: 1rem; text-align: center; }
    #search-bar { display: flex; justify-content: center; margin: 1rem; }
    #search-bar input, #search-bar select { padding: 0.5rem; margin: 0 0.5rem; font-size: 1rem; }
    #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; padding: 1rem; }
    .card { background: white; border-radius: 8px; padding: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .card:hover { transform: scale(1.02); }
    .logo { width: 80px; height: 80px; object-fit: contain; margin-bottom: 0.5rem; }
    .uni-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 0.3rem; }
    .country { color: #555; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .link a { text-decoration: none; color: #004080; font-weight: bold; }
    .fav-btn { margin-top: 0.5rem; padding: 0.4rem 0.6rem; border: none; border-radius: 5px; cursor: pointer; background: #ffcc00; font-weight: bold; }
    nav { background: #eee; padding: 0.5rem; text-align: center; }
    nav a { margin: 0 10px; text-decoration: none; color: #004080; font-weight: bold; }
  </style>
</head>
<body>

<header>
  <h1>University Search</h1>
  <h2>Find your top schools!</h2>
</header>

<nav>
  <a href="index.html">Search</a> | <a href="favorites.html">Favorites</a>
</nav>

<section id="search-bar">
  <input type="text" id="searchInput" placeholder="Search by name...">
  <select id="countryFilter">
    <option value="">All Countries</option>
    <option value="United States">United States</option>
    <option value="United Kingdom">United Kingdom</option>
    <option value="Canada">Canada</option>
  </select>
  <button onclick="searchUniversities()">Search</button>
</section>

<section id="results"></section>

<script>
const LOGO_DEV_TOKEN = "pk_TqbhE60QRDi4zBEHwwmdOg"; // replace with your token

function getFavorites() {
  return JSON.parse(localStorage.getItem("favorites") || "[]");
}

function saveFavorites(favs) {
  localStorage.setItem("favorites", JSON.stringify(favs));
}

function toggleFavorite(uni) {
  let favorites = getFavorites();
  const exists = favorites.find(f => f.domains[0] === uni.domains[0]);
  if (exists) {
    favorites = favorites.filter(f => f.domains[0] !== uni.domains[0]);
  } else {
    favorites.push(uni);
  }
  saveFavorites(favorites);
  searchUniversities(); // refresh UI
}

function isFavorite(domain) {
  const favorites = getFavorites();
  return favorites.some(f => f.domains[0] === domain);
}

async function searchUniversities() {
  const query = document.getElementById("searchInput").value;
  const country = document.getElementById("countryFilter").value;
  let url = `http://universities.hipolabs.com/search?name=${query}`;
  if (country) url += `&country=${country}`;

  const response = await fetch(url);
  const data = await response.json();

  const resultsContainer = document.getElementById("results");
  resultsContainer.innerHTML = "";

  data.forEach(uni => {
    let domain = "";
    try { domain = new URL(uni.web_pages[0]).hostname; }
    catch { domain = uni.domains[0] || ""; }

    const logoUrl = domain
      ? `https://img.logo.dev/${domain}?token=${LOGO_DEV_TOKEN}`
      : "https://via.placeholder.com/80";

    const favLabel = isFavorite(uni.domains[0]) ? "★ Remove Favorite" : "☆ Add Favorite";

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${logoUrl}" class="logo" alt="Logo" onerror="this.src='https://via.placeholder.com/80'">
      <div class="uni-name">${uni.name}</div>
      <div class="country">📍 ${uni.country}</div>
      <div class="link"><a href="${uni.web_pages[0]}" target="_blank">${uni.web_pages[0]}</a></div>
      <button class="fav-btn" onclick='toggleFavorite(${JSON.stringify(uni)})'>${favLabel}</button>
    `;
    resultsContainer.appendChild(card);
  });
}
</script>

</body>
</html>
